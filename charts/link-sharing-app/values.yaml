# Default values for link-sharing-app.

replicaCount: 1

# Shared image configuration for the unified app container.
image:
  repository: ghcr.io/wedgehov/link-sharing-app
  pullPolicy: IfNotPresent
  tag: ""
  digest: "" # Optional immutable digest. If set, it takes precedence over tag.

# For pulling private images from GHCR
imagePullSecretName: ""

backend:
  aspnetcoreEnvironment: "Production"

database:
  image:
    repository: postgres
    tag: "16-alpine"
  storage: 1Gi
  secretName: link-sharing-app-db-secret

ingress:
  enabled: true
  className: webapprouting.kubernetes.azure.com
  host: link-sharing-app.example.com

resources: {}
databaseResources: {}

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: true

storageClassName: managed-csi


