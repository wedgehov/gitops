# Overrides for the 'fm-todo-app' from the 'main' branch

image:
  tag: "main"
  # Updated by CI on each main push to create an immutable deployment reference.
  digest: "sha256:89411b38df8fbb99ffc8564bb1198fea181e2030540b8e86f920af31accc3bc2"
  pullPolicy: IfNotPresent

ingress:
  host: fm-todo-app-main.vhovet.com

networkPolicy:
  enabled: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi

databaseResources:
  requests:
    cpu: 50m
    memory: 256Mi
