  # Updated by CI on each main push to create an immutable deployment reference.
  digest: "sha256:140fb0d6fda9583f17d44f655d1e37d79771a12ccf93b858baaf9553c775989b"
  pullPolicy: IfNotPresent

ingress:
  host: fm-todo-app-main.vhovet.com

networkPolicy:
  enabled: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi

databaseResources:
  requests:
    cpu: 50m
    memory: 256Mi
