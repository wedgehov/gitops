# Overrides for the 'fm-todo-app' in the 'dev' environment

# Use a single image tag for the combined app image.
image:
  tag: "v1.5.0"

backend:
  aspnetcoreEnvironment: "Development"

ingress:
  host: fm-todo-app-dev.vhovet.com

networkPolicy:
  enabled: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi

databaseResources:
  requests:
    cpu: 50m
    memory: 256Mi
