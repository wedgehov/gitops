# Overrides for the 'link-sharing-app' from the 'main' branch

frontend:
  image:
    pullPolicy: Always
    tag: "latest"

backend:
  image:
    pullPolicy: Always
    tag: "latest"

# Private GHCR pull secret
imagePullSecretName: "ghcr-credentials"

ingress:
  host: link-sharing-app-dev-main.vhovet.com

networkPolicy:
  enabled: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi

databaseResources:
  requests:
    cpu: 50m
    memory: 256Mi
