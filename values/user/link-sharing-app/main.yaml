# Overrides for the 'link-sharing-app' from the 'main' branch

image:
  tag: "main"
  # Updated by CI on each main push to create an immutable deployment reference.
  digest: "sha256:865d1da5042955e2f6940917cf4bb8ac91d523a34673ec51d5c57621824bc711"
  pullPolicy: IfNotPresent

# Private GHCR pull secret (not needed if the image is public)
# imagePullSecretName: "ghcr-credentials"

ingress:
  host: link-sharing-app-main.vhovet.com

serviceAccount:
  create: true
  annotations:
    azure.workload.identity/client-id: "0ffb9760-fb01-460c-889b-32b000f56249"

blobStorage:
  accountUrl: "https://linksharingstore27c9.blob.core.windows.net"
  containerName: "avatars"

networkPolicy:
  enabled: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi

databaseResources:
  requests:
    cpu: 50m
    memory: 256Mi
