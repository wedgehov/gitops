# Overrides for the 'tip-calculator-app' from the 'main' branch

image:
  tag: "main"
  # Updated by CI on each main push to create an immutable deployment reference.
  digest: ""
  pullPolicy: IfNotPresent

ingress:
  host: tip-calculator-main.vhovet.com

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
