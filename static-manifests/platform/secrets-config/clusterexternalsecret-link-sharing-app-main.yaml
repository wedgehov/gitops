apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: link-sharing-app-main-db
spec:
  externalSecretName: link-sharing-app-db-secret
  refreshTime: 1h
  namespaceSelectors:
    - matchLabels:
        kubernetes.io/metadata.name: link-sharing-app-main
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      kind: ClusterSecretStore
      name: azure-keyvault
    target:
      name: link-sharing-app-db-secret
      creationPolicy: Owner
    data:
      - secretKey: POSTGRES_USER
        remoteRef:
          key: link-sharing-app-main-postgres-user
      - secretKey: POSTGRES_PASSWORD
        remoteRef:
          key: link-sharing-app-main-postgres-password
      - secretKey: POSTGRES_DB
        remoteRef:
          key: link-sharing-app-main-postgres-db
