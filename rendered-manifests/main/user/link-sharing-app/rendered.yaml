# Source: link-sharing-app/templates/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: link-sharing-app-main-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: link-sharing-app-main-backend
  template:
    metadata:
      annotations:
        checksum/config: f6529b52b87997cc5df9c65bba38c30cd2071bac73b9afbc89decaedc30c4b83
      labels:
        app: link-sharing-app-main-backend
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: link-sharing-app-main-backend
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
      - name: backend
        image: "ghcr.io/wedgehov/link-sharing-app@sha256:4b71da2ebf823169eeb5432d940c561a9be7f7ebeac0c3f3e9e12e8df1c8e26b"
        imagePullPolicy: IfNotPresent
        env:
        - name: ConnectionStrings__DefaultConnection
          value: "Host=link-sharing-app-main-db;Port=5432;Database=$(POSTGRES_DB);Username=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD)"
        # OTEL configuration to match platform defaults
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://tempo-dev.monitoring.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_SERVICE_NAME
          value: "link-sharing-app-backend"
        - name: OTEL_TRACES_SAMPLER
          value: "always_on"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: BlobStorage__AccountUrl
          value: "https://linksharingstore27c9.blob.core.windows.net"
        - name: BlobStorage__ContainerName
          value: "avatars"
        envFrom:
        - secretRef:
            name: link-sharing-app-db-secret
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
# Source: link-sharing-app/templates/database-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: link-sharing-app-main-db
spec:
  serviceName: link-sharing-app-main-db
  replicas: 1
  selector:
    matchLabels:
      app: link-sharing-app-main-db
  template:
    metadata:
      labels:
        app: link-sharing-app-main-db
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: database
        image: "postgres:16-alpine"
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        envFrom:
        - secretRef:
            name: link-sharing-app-db-secret
        ports:
        - containerPort: 5432
          name: postgres
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: db-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: managed-csi
      resources:
        requests:
          storage: 1Gi
