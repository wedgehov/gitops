---
# Source: tip-calculator-app/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: tip-calculator-app-main
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: tip-calculator-app-main
---
# Source: tip-calculator-app/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tip-calculator-app-main
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tip-calculator-app-main
  template:
    metadata:
      labels:
        app: tip-calculator-app-main
    spec:
      containers:
      - name: frontend
        image: "ghcr.io/wedgehov/tip-calculator-app@sha256:c9738b908080ad6108e40dada0fdd7051576834a1277a9d34e05dc17e06ceaa3"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 64Mi
---
# Source: tip-calculator-app/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tip-calculator-app-main-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  tls:
  - hosts:
    - "tip-calculator-main.vhovet.com"
    secretName: tip-calculator-app-main-tls
  rules:
  - host: "tip-calculator-main.vhovet.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tip-calculator-app-main
            port:
              number: 80
